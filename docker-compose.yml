# Brings up PostgreSQL (seeded automatically) + the API service.
#
#   cp .env.example .env   # then fill in LLM_API_KEY / LLM_BASE_URL / LLM_MODEL
#   docker compose up --build
#
# The DB initializes from ./db/*.sql on first start (schema + read-only role +
# seed data). To re-seed from scratch: `docker compose down -v` then up again.

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: analytics_owner
      POSTGRES_PASSWORD: analytics_owner
      POSTGRES_DB: analytics
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Files run in lexical order: 01_schema.sql then 02_seed.sql.
      - ./db:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U analytics_owner -d analytics"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    env_file:
      - .env
    environment:
      # The service connects with the READ-ONLY role created in 01_schema.sql.
      DATABASE_URL: postgresql://assistant_ro:assistant_ro@db:5432/analytics
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    # Lets the container reach an OpenAI-compatible endpoint running on host.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Readiness = the DB answers. Uses Python (no curl in the slim image).
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health/ready').status==200 else 1)"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  pgdata:
